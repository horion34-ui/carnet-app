<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff">
  <title>Carnet UB</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{font-family:'Roboto','Noto Sans',sans-serif;background:#fff;width:100%;height:100%;overflow:hidden;}
    .phone{background:#f2f2f2;width:100%;height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative;}

    .nav-h{background:#fff;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:.5px solid #e0e0e0;height:50px;flex-shrink:0;}
    .nav-title{font-size:17px;font-weight:700;color:#000;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%;text-align:center;}
    .nbtn{background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;border-radius:6px;}

    .banner{background:#1565c0;padding:10px 0;text-align:center;flex-shrink:0;}
    .banner span{color:#fff;font-size:18px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}

    .content{background:#f2f2f2;padding:8px 10px 70px;flex:1;overflow:hidden;display:flex;flex-direction:column;gap:8px;}
    .card{background:#fff;border-radius:10px;}

    /* Foto y escudo — clavado igual que Clara */
    .profile-wrapper{
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
      padding:16px 0 8px;
    }
    .profile-container{
      width:170px;
      height:170px;
      position:relative;
    }
    .profile-img{
      width:170px;
      height:170px;
      border-radius:50%;
      object-fit:cover;
      object-position:center 60%;
      display:block;
    }
    /* Escudo: posición absoluta a la derecha de la foto, igual que Clara */
    .ub-escudo{
      position:absolute;
      left:calc(50% + 85px + 10px);
      top:16px;
      height:60px;
      width:auto;
      mix-blend-mode:multiply;
      background:transparent;
    }

    .time-card{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 18px;}
    .time-txt{font-size:15px;color:#000;}

    .info-card{padding:0 14px;}
    .irow{display:flex;align-items:flex-start;padding:10px 0;border-bottom:.5px solid #e8e8e8;}
    .irow:last-child{border-bottom:none;}
    .ilabel{font-size:14px;font-weight:700;color:#000;width:150px;flex-shrink:0;}
    .ival{font-size:14px;color:#000;flex:1;}

    .bc-card{padding:12px 0 10px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
    .bc-hint{font-size:12px;color:#666;margin-top:2px;}

    /* BARRA NAV INFERIOR — fija en la parte inferior, siempre visible */
    .bnav{
      background:#fff;
      border-top:.5px solid #e0e0e0;
      display:flex;
      justify-content:space-around;
      padding:8px 0 calc(8px + env(safe-area-inset-bottom));
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      z-index:100;
    }
    .ni{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:3px;
      flex:1;
      cursor:pointer;
      padding:3px 0;
      border:none;
      background:none;
      border-radius:8px;
      -webkit-tap-highlight-color:transparent;
    }
    .ni svg{
      width:24px;
      height:24px;
      stroke:#757575;
      fill:none;
      stroke-width:1.7;
      stroke-linecap:round;
      stroke-linejoin:round;
    }
    .ni .lbl{font-size:10px;color:#757575;}
    .ni.on svg{stroke:#1565c0;fill:#e8f0fe;}
    .ni.on .lbl{color:#1565c0;font-weight:600;}

    /* Para el icono de inicio filled cuando está activo */
    .ni.on #icon-home-path{fill:#1565c0;stroke:#1565c0;}
    .ni.on #icon-home-poly{fill:#fff;stroke:#fff;}

    .page{display:none;}
    .page.active{display:flex;flex-direction:column;flex:1;overflow:hidden;}

    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:8px;}
    .cal-day{text-align:center;font-size:12px;padding:5px 2px;border-radius:6px;color:#000;cursor:pointer;}
    .cal-day.hd{font-weight:700;color:#888;cursor:default;}
    .cal-day.today{background:#1565c0;color:#fff;font-weight:700;}

    .notif-item{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-bottom:.5px solid #eee;}
    .notif-dot{width:8px;height:8px;border-radius:50%;background:#1565c0;flex-shrink:0;margin-top:4px;}
    .notif-txt{font-size:13px;color:#000;line-height:1.4;}

    .search-box{padding:10px 14px;}
    .search-box input{width:100%;padding:9px 12px;border:.5px solid #ccc;border-radius:8px;font-size:14px;outline:none;background:#f8f8f8;}

    .cfg-row{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:.5px solid #eee;cursor:pointer;}
    .cfg-label{font-size:14px;color:#000;}
    .toggle{width:40px;height:22px;background:#ccc;border-radius:11px;position:relative;border:none;cursor:pointer;}
    .toggle.on{background:#1565c0;}
    .toggle::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .2s;}
    .toggle.on::after{left:20px;}
  </style>
</head>

<script>
  // Elimina todos los Service Workers y cachés antiguos para evitar versiones cacheadas
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(registrations) {
      for (var r of registrations) { r.unregister(); }
    });
    caches.keys().then(function(keys) {
      keys.forEach(function(k) { caches.delete(k); });
    });
  }

  var curPage='home', bcExpanded=false;
  var navTitles={home:'Universidad de B...',cfg:'Configuración',cal:'Calendario',notif:'Alertas',search:'Buscar'};

  function nav(p){
    document.querySelectorAll('.page').forEach(function(el){el.classList.remove('active');});
    document.getElementById('pg-'+p).classList.add('active');
    document.querySelectorAll('.ni').forEach(function(el){el.classList.remove('on');});
    document.getElementById('nb-'+p).classList.add('on');
    document.getElementById('navtitle').textContent=navTitles[p];
    curPage=p;
    if(p==='cal') buildCal();
  }

  function goBack(){nav('home');}

  function toggleBc(){
    bcExpanded=!bcExpanded;
    document.getElementById('bc-small').style.display=bcExpanded?'none':'block';
    document.getElementById('bc-big').style.display=bcExpanded?'block':'none';
    document.getElementById('bc-hint-txt').textContent=bcExpanded?'Clica para reducir':'Clica para ampliar';
  }

  function pad(n){return String(n).padStart(2,'0');}

  function tick(){
    var now=new Date();
    var d=now.getDate(),mo=now.getMonth()+1,y=now.getFullYear();
    var h=now.getHours(),m=now.getMinutes(),s=now.getSeconds();
    var el=document.getElementById('lt');
    if(el) el.textContent=d+'-'+mo+'-'+y+' '+pad(h)+':'+pad(m)+':'+pad(s);
    var mA=(m/60)*360+(s/60)*6;
    var hA=(h%12/12)*360+(m/60)*30;
    var cx=16,cy=16,mR=(mA-90)*Math.PI/180,hR=(hA-90)*Math.PI/180;
    var mx=cx+10*Math.cos(mR),my=cy+10*Math.sin(mR);
    var hx=cx+7*Math.cos(hR),hy=cy+7*Math.sin(hR);
    var hm2=document.getElementById('hm'),hh2=document.getElementById('hh');
    if(hm2){hm2.setAttribute('x2',mx.toFixed(2));hm2.setAttribute('y2',my.toFixed(2));}
    if(hh2){hh2.setAttribute('x2',hx.toFixed(2));hh2.setAttribute('y2',hy.toFixed(2));}
  }
  tick();setInterval(tick,1000);

  function buildCal(){
    var g=document.getElementById('calgrid');
    if(!g||g.children.length>0)return;
    var days=['L','M','X','J','V','S','D'];
    days.forEach(function(d){var el=document.createElement('div');el.className='cal-day hd';el.textContent=d;g.appendChild(el);});
    for(var i=0;i<4;i++){var el=document.createElement('div');el.className='cal-day';g.appendChild(el);}
    for(var d2=1;d2<=31;d2++){
      var el=document.createElement('div');
      el.className='cal-day'+(d2===22?' today':'');
      el.textContent=d2;
      g.appendChild(el);
    }
  }

  function tog(id){document.getElementById(id).classList.toggle('on');}
</script>
</body>
</html>
